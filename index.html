<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>RSRO Accounting Dashboard</title>

    <style>
        body {
            font-family: Segoe UI, Arial;
            background: #f4f6f9;
            padding: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 220px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        .number {
            font-size: 40px;
            font-weight: bold;
            color: #0078d4;
        }

        .label {
            margin-top: 10px;
            color: #555;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>

    <h1>RSRO Accounting Dashboard</h1>

    <div class="cards">

        <div class="card">
            <div id="pending" class="number">0</div>
            <div class="label">Hunyo Pending</div>
        </div>

        <div class="card">
            <div id="uploaded" class="number">0</div>
            <div class="label">Hunyo Uploaded</div>
        </div>

        <div class="card">
            <div id="awaiting" class="number">0</div>
            <div class="label">Awaiting</div>
        </div>

        <div class="card">
            <div id="complete" class="number">0</div>
            <div class="label">Complete</div>
        </div>

    </div>

    <div class="footer">
        Last Updated:
        <span id="updated">Loading...</span>
    </div>

    <script>

        async function loadData() {

            try {

                const response = await fetch(
                    "./dashboard-data.json?v=" + new Date().getTime()
                );

                if (!response.ok) {
                    throw new Error(
                        "HTTP Error: " + response.status
                    );
                }

                const data = await response.json();

                document.getElementById("pending").innerText =
                    data.hunyoPending || 0;

                document.getElementById("uploaded").innerText =
                    data.hunyoUploaded || 0;

                document.getElementById("awaiting").innerText =
                    data.awaiting || 0;

                document.getElementById("complete").innerText =
                    data.complete || 0;

                document.getElementById("updated").innerText =
                    data.lastUpdated || "N/A";

            }
            catch (error) {

                console.error("Dashboard Error:", error);

                document.getElementById("updated").innerText =
                    "Failed to load data";
            }
        }

        loadData();

        setInterval(loadData, 30000);

    </script>

</body>

</html>
