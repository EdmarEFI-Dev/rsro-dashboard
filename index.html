<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <title>RSRO Dashboard</title>

    <style>
        body {
            font-family: Segoe UI;
            background: #f4f6f9;
            padding: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 220px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
        }

        .number {
            font-size: 40px;
            font-weight: bold;
        }

        .label {
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <h1>RSRO Accounting Dashboard</h1>

    <div class="cards">

        <div class="card">
            <div id="pending" class="number">0</div>
            <div class="label">Hunyo Pending</div>
        </div>

        <div class="card">
            <div id="uploaded" class="number">0</div>
            <div class="label">Hunyo Uploaded</div>
        </div>

        <div class="card">
            <div id="awaiting" class="number">0</div>
            <div class="label">Awaiting</div>
        </div>

        <div class="card">
            <div id="complete" class="number">0</div>
            <div class="label">Complete</div>
        </div>

    </div>

    <br>

    Last Updated:
    <span id="updated"></span>

 <script>

async function loadData() {

    try {

        const response = await fetch(
            "https://esquirefinancing.sharepoint.com/sites/RSRO-AccountingReports/_api/web/lists/getbytitle('Accounting Report Requests')/items?$select=Status",
            {
                method: "GET",
                headers: {
                    "Accept": "application/json;odata=nometadata"
                },
                credentials: "include" // IMPORTANT for SharePoint login session
            }
        );

        const result = await response.json();
        const items = result.value;

        let pending = 0;
        let uploaded = 0;
        let awaiting = 0;
        let complete = 0;

        items.forEach(item => {

            const status = (item.Status || "").toLowerCase();

            if (status === "pending") pending++;
            if (status === "uploaded") uploaded++;
            if (status === "awaiting") awaiting++;
            if (status === "complete") complete++;

        });

        document.getElementById("pending").innerText = pending;
        document.getElementById("uploaded").innerText = uploaded;
        document.getElementById("awaiting").innerText = awaiting;
        document.getElementById("complete").innerText = complete;

        document.getElementById("updated").innerText =
            new Date().toLocaleString();

    } catch (error) {

        console.log("SharePoint API error:", error);

        document.getElementById("updated").innerText =
            "Failed to load data (auth/CORS issue)";
    }
}

loadData();
setInterval(loadData, 30000);

</script>

</body>

</html>
